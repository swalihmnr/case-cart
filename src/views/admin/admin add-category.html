<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Error - Something Went Wrong</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }
        
        .animate-pulse-ring {
            animation: pulse-ring 2s ease-out infinite;
        }
        
        .animate-fadeInUp {
            animation: fadeInUp 0.8s ease-out forwards;
        }
        
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        
        .btn-hover {
            transition: all 0.3s ease;
        }
        
        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }
        
        .btn-hover:active {
            transform: translateY(0);
        }
        
        .spin-slow {
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50">
    
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-2xl w-full opacity-0 animate-fadeInUp">
            
            <!-- Error Card -->
            <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-12 relative overflow-hidden">
                
                <!-- Decorative Background Elements -->
                <div class="absolute top-0 right-0 w-64 h-64 bg-gradient-to-br from-red-100 to-orange-100 rounded-full blur-3xl opacity-30 pointer-events-none"></div>
                <div class="absolute bottom-0 left-0 w-64 h-64 bg-gradient-to-tr from-blue-100 to-purple-100 rounded-full blur-3xl opacity-30 pointer-events-none"></div>
                
                <!-- Content -->
                <div class="relative z-10">
                    
                    <!-- Icon Container -->
                    <div class="flex justify-center mb-8">
                        <div class="relative">
                            <!-- Pulsing Ring -->
                            <div class="absolute inset-0 bg-red-200 rounded-full animate-pulse-ring"></div>
                            <div class="absolute inset-0 bg-red-200 rounded-full animate-pulse-ring delay-100"></div>
                            
                            <!-- Main Icon -->
                            <div class="relative bg-gradient-to-br from-red-500 to-orange-500 rounded-full p-6 animate-float">
                                <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                                </svg>
                                <div class="absolute -top-1 -right-1 bg-yellow-400 rounded-full p-1">
                                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Error Message -->
                    <div class="text-center mb-8 opacity-0 animate-fadeInUp delay-200">
                        <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-4">
                            Oops! Cart Error
                        </h1>
                        <p class="text-lg text-gray-600 mb-2">
                            We couldn't load your shopping cart
                        </p>
                        <p class="text-sm text-gray-500">
                            Don't worry, your items are safe! This might be a temporary issue.
                        </p>
                    </div>
                    
                    <!-- Error Details -->
                    <div class="bg-gradient-to-r from-red-50 to-orange-50 border-l-4 border-red-500 rounded-lg p-4 mb-8 opacity-0 animate-fadeInUp delay-300">
                        <div class="flex items-start">
                            <svg class="w-5 h-5 text-red-500 mt-0.5 mr-3 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path>
                            </svg>
                            <div>
                                <h3 class="text-sm font-semibold text-gray-900 mb-1">Common causes:</h3>
                                <ul class="text-sm text-gray-700 space-y-1">
                                    <li>• Network connection issues</li>
                                    <li>• Server temporarily unavailable</li>
                                    <li>• Session expired</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Action Buttons -->
                    <div class="flex flex-col sm:flex-row gap-4 opacity-0 animate-fadeInUp delay-300">
                        <button onclick="refreshPage()" class="flex-1 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-semibold py-4 px-6 rounded-xl btn-hover flex items-center justify-center gap-2 group">
                            <svg id="refreshIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                            <span id="refreshText">Try Again</span>
                        </button>
                        
                        <button onclick="goHome()" class="flex-1 bg-white text-gray-700 font-semibold py-4 px-6 rounded-xl border-2 border-gray-300 btn-hover flex items-center justify-center gap-2 hover:border-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                            </svg>
                            Go to Homepage
                        </button>
                    </div>
                    
                    <!-- Additional Help -->
                    <div class="mt-8 pt-8 border-t border-gray-200 text-center opacity-0 animate-fadeInUp delay-300">
                        <p class="text-sm text-gray-600 mb-4">
                            Still having trouble?
                        </p>
                        <a href="#" class="text-blue-600 hover:text-blue-700 font-medium text-sm inline-flex items-center gap-2 hover:gap-3 transition-all">
                            Contact Support
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                            </svg>
                        </a>
                    </div>
                    
                </div>
            </div>
            
            <!-- Footer Note -->
            <div class="mt-6 text-center opacity-0 animate-fadeInUp delay-300">
                <p class="text-sm text-gray-500">
                    Error Code: CART_500 • <span id="timestamp"></span>
                </p>
            </div>
            
        </div>
    </div>
    
    <script>
        // Display current timestamp
        document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
        
        // Refresh functionality with animation
        function refreshPage() {
            const refreshIcon = document.getElementById('refreshIcon');
            const refreshText = document.getElementById('refreshText');
            
            refreshIcon.classList.add('spin-slow');
            refreshText.textContent = 'Refreshing...';
            
            // Simulate refresh - in real app would reload data
            setTimeout(() => {
                refreshIcon.classList.remove('spin-slow');
                refreshText.textContent = 'Try Again';
                // window.location.reload();
                alert('Cart refreshed! In a real app, this would reload your cart data.');
            }, 1500);
        }
        
        // Navigate to homepage
        function goHome() {
            // window.location.href = '/';
            alert('In a real app, this would navigate to your homepage.');
        }
        
        // Add keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                refreshPage();
            }
        });
    </script>
    
</body>
</html>
